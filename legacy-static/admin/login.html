<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Leaf & Lens 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <style>
    /* HIGH TECH THEME FOR ADMIN LOGIN */
    :root {
      --tech-bg: #030a06;
      --tech-glow: #52b788;
      --tech-grid: rgba(82, 183, 136, 0.1);
    }
    body { padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--tech-bg); overflow: hidden; }
    
    /* Animated Grid Background */
    .tech-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: 
        linear-gradient(var(--tech-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--tech-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      perspective: 1000px;
    }
    .tech-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, transparent 30%, var(--tech-bg) 90%);
    }

    /* Floating Data Particles */
    .data-particle {
      position: absolute;
      width: 2px; height: 10px;
      background: var(--tech-glow);
      box-shadow: 0 0 10px var(--tech-glow);
      opacity: 0;
      animation: scanline 4s linear infinite;
    }
    @keyframes scanline {
      0% { transform: translateY(-100vh); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    /* Login Console */
    .login-console {
      position: relative; z-index: 1;
      width: 100%; max-width: 450px;
      background: rgba(10, 26, 16, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(82, 183, 136, 0.3);
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(82, 183, 136, 0.1);
      overflow: hidden;
      animation: consoleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .console-header {
      background: rgba(82, 183, 136, 0.1);
      border-bottom: 1px solid rgba(82, 183, 136, 0.3);
      padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .console-title {
      font-family: 'JetBrains Mono', monospace;
      color: var(--tech-glow);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .console-dots { display: flex; gap: 6px; }
    .console-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(82,183,136,0.3); }
    .console-dot:nth-child(1) { background: #e63946; }
    .console-dot:nth-child(2) { background: #f4a261; }
    .console-dot:nth-child(3) { background: #52b788; }

    .console-body { padding: 2.5rem; }
    
    .sys-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .sys-logo h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900; font-size: 2rem;
      background: linear-gradient(135deg, #52b788, #b7e4c7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 0;
    }
    .sys-logo p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: rgba(149, 213, 178, 0.6);
      margin-top: 0.5rem; letter-spacing: 0.05em;
    }

    .login-form { display: flex; flex-direction: column; gap: 1.5rem; }
    
    .tech-input-group { position: relative; }
    .tech-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: #95d5b2;
      display: block; margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .tech-input {
      width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem;
      background: rgba(5, 15, 8, 0.8);
      border: 1px solid rgba(82, 183, 136, 0.3);
      color: #fff; font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem; border-radius: 4px;
      transition: all 0.3s ease;
      outline: none;
    }
    .tech-input:focus {
      border-color: #52b788;
      box-shadow: 0 0 15px rgba(82, 183, 136, 0.2);
    }
    .input-icon {
      position: absolute; left: 0.8rem; top: 2.1rem;
      color: rgba(82, 183, 136, 0.6);
    }

    .login-btn {
      width: 100%; padding: 1rem;
      background: rgba(82, 183, 136, 0.1);
      border: 1px solid #52b788;
      color: #52b788;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.3s ease;
      border-radius: 4px;
      position: relative; overflow: hidden;
    }
    .login-btn::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(82,183,136,0.2), transparent);
      transition: all 0.5s ease;
    }
    .login-btn:hover {
      background: #52b788; color: #000;
      box-shadow: 0 0 20px rgba(82, 183, 136, 0.4);
    }
    .login-btn:hover::before { left: 100%; }

    .login-err {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(230, 57, 70, 0.1); border: 1px solid #e63946;
      color: #ff6b7a; padding: 0.75rem; font-size: 0.8rem;
      border-radius: 4px; display: none; align-items: center; gap: 0.5rem;
    }
    .login-err.show { display: flex; animation: shake 0.4s ease; }

    @keyframes consoleIn {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .login-back { text-align: center; margin-top: 1.5rem; font-family: 'JetBrains Mono', monospace; }
    .login-back a { font-size: 0.75rem; color: rgba(149, 213, 178, 0.6); transition: 0.3s; text-decoration: none; }
    .login-back a:hover { color: #52b788; text-shadow: 0 0 8px rgba(82,183,136,0.5); }
  </style>
</head>
<body>
  <div class="tech-bg"></div>
  
  <!-- Generated Particles via JS -->
  <div id="particle-container"></div>

  <div class="login-console">
    <div class="console-header">
      <div class="console-title"><i data-lucide="terminal" style="width:14px;height:14px;"></i> ADMIN_ACCESS_NODE</div>
      <div class="console-dots">
        <span class="console-dot"></span>
        <span class="console-dot"></span>
        <span class="console-dot"></span>
      </div>
    </div>
    
    <div class="console-body">
      <div class="sys-logo">
        <h1>SYS.ADMIN</h1>
        <p>LEAF & LENS PROTOCOL v2.0</p>
      </div>
      
      <form class="login-form" id="loginForm" novalidate>
        <div class="tech-input-group">
          <label class="tech-label" for="adminUser">IDENTITY</label>
          <i data-lucide="cpu" style="width:16px;height:16px;" class="input-icon"></i>
          <input type="text" id="adminUser" class="tech-input" placeholder="Enter ID" autocomplete="username" />
        </div>
        
        <div class="tech-input-group">
          <label class="tech-label" for="adminPass">PASSPHRASE</label>
          <i data-lucide="key" style="width:16px;height:16px;" class="input-icon"></i>
          <input type="password" id="adminPass" class="tech-input" placeholder="Enter Passphrase" autocomplete="current-password" />
        </div>
        
        <div class="login-err" id="loginErr">
          <i data-lucide="alert-triangle" style="width:16px;height:16px;"></i>
          AUTH_FAILED: INVALID CREDENTIALS
        </div>
        
        <button type="submit" class="login-btn">
          INITIALIZE CONNECTION
        </button>
      </form>
      
      <div style="text-align:center; margin-top: 1rem;">
          <span style="font-family:'JetBrains Mono', monospace; font-size:0.7rem; color:rgba(82,183,136,0.4)">DEFAULT: admin / leaflens2026</span>
      </div>

      <div class="login-back">
        <a href="../home.html">[ ESCAPE TO PUBLIC PORTAL ]</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      if (LL.isAdminLoggedIn()) window.location.href = 'dashboard.html';

      // Generate Particles
      const pc = document.getElementById('particle-container');
      for(let i=0; i<20; i++) {
        let p = document.createElement('div');
        p.className = 'data-particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = (Math.random() * 4) + 's';
        p.style.animationDuration = (2 + Math.random() * 3) + 's';
        pc.appendChild(p);
      }

      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const user = document.getElementById('adminUser').value.trim();
        const pass = document.getElementById('adminPass').value;
        const errEl = document.getElementById('loginErr');

        const stored = LL.get('ll_admin_creds') || { username: 'admin', password: 'leaflens2026' };
        if (user === stored.username && pass === stored.password) {
          LL.adminLogin();
          document.querySelector('.login-console').style.transform = 'scale(1.05)';
          document.querySelector('.login-console').style.opacity = '0';
          document.querySelector('.login-console').style.transition = 'all 0.5s ease';
          
          setTimeout(() => window.location.href = 'dashboard.html', 500);
        } else {
          errEl.classList.add('show');
          if (window.lucide) lucide.createIcons();
          setTimeout(() => errEl.classList.remove('show'), 3000);
        }
      });
    });
  </script>
</body>
</html>
