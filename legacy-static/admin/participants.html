<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participants — Leaf & Lens Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <script src="../assets/js/turso.js"></script>
</head>
<body class="admin-body">

<aside class="admin-sidebar">
  <div class="sidebar-logo">
    <span style="font-size:1.6rem;">🌿</span>
    <div><div class="sidebar-logo-text">Leaf &amp; Lens</div><span class="sidebar-admin-badge">Admin Panel</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main</div>
    <a href="dashboard.html" class="sidebar-link"><i data-lucide="layout-dashboard" style="width:16px;height:16px;"></i> Dashboard</a>
    <a href="submissions.html" class="sidebar-link"><i data-lucide="image" style="width:16px;height:16px;"></i> Submissions</a>
    <a href="participants.html" class="sidebar-link active"><i data-lucide="users" style="width:16px;height:16px;"></i> Participants</a>
    <a href="results.html" class="sidebar-link"><i data-lucide="trophy" style="width:16px;height:16px;"></i> Results</a>
    <a href="registrations.html" class="sidebar-link"><i data-lucide="settings" style="width:16px;height:16px;"></i> Registrations</a>
    <div class="sidebar-section-label">Site</div>
    <a href="../home.html" class="sidebar-link" target="_blank"><i data-lucide="external-link" style="width:16px;height:16px;"></i> View Site</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-logout" id="logoutBtn"><i data-lucide="log-out" style="width:15px;height:15px;"></i> Sign Out</button>
  </div>
</aside>

<main class="admin-main">
  <div class="admin-topbar">
    <h1 class="topbar-title">Participants</h1>
    <div class="topbar-right">
      <span id="partCountLabel" style="font-size:0.82rem;color:var(--text-muted);"></span>
    </div>
  </div>
  <div class="admin-content">

    <!-- FILTER BAR -->
    <div class="admin-table-wrap" style="margin-bottom:1.25rem;padding:1rem 1.5rem;">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
        <div class="search-wrap">
          <i data-lucide="search" class="search-icon" style="width:14px;height:14px;"></i>
          <input type="text" class="table-search" id="searchInput" placeholder="Search name, email, ID, roll no..." oninput="renderTable()" />
        </div>
        <select class="table-filter" id="filterCat" onchange="renderTable()">
          <option value="all">All Categories</option>
          <option value="Photo">Photo</option>
          <option value="Reel">Reel</option>
          <option value="Both">Both</option>
        </select>
        <select class="table-filter" id="filterStatus" onchange="renderTable()">
          <option value="all">All Status</option>
          <option value="pending">⏳ Pending</option>
          <option value="approved">✅ Approved</option>
          <option value="rejected">❌ Rejected</option>
        </select>
        <select class="table-filter" id="filterYear">
          <option value="all">1st Year</option>
        </select>
        <select class="table-filter" id="filterBranch" onchange="renderTable()">
          <option value="all">All Branches</option>
          <option value="CSE">CSE</option><option value="IT">IT</option><option value="CS">CS</option>
          <option value="CSD">CSD</option><option value="CAI">CAI</option><option value="AIDS">AIDS</option>
          <option value="ECE">ECE</option><option value="ECM">ECM</option><option value="CIVIL">CIVIL</option>
          <option value="MECH">MECH</option><option value="EEE">EEE</option>
        </select>
        <button class="btn btn-outline" style="font-size:0.82rem;padding:0.45rem 1rem;margin-left:auto;" onclick="exportAllCSV()">
          <i data-lucide="download" style="width:14px;height:14px;"></i> Export CSV
        </button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="admin-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>ID</th><th>Name</th><th>Contact</th>
            <th>Roll No</th><th>Branch</th><th>Year</th><th>Category</th><th>Pledge</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="participantsTable"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>

  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">Participant Detail</span>
      <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">
        <i data-lucide="x" style="width:18px;height:18px;"></i>
      </button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../assets/js/main.js"></script>
<script>
let _allSubs = [];
let currentPage = 1;
const PER_PAGE = 20;

document.addEventListener('DOMContentLoaded', async () => {
  if (!LL.isAdminLoggedIn()) { window.location.href = 'login.html'; return; }
  if (window.lucide) lucide.createIcons();

  _allSubs = await TURSO.getSubmissions();
  renderTable();
  document.getElementById('logoutBtn').addEventListener('click', () => { LL.adminLogout(); window.location.href = 'login.html'; });
});

function getFiltered() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const cat    = document.getElementById('filterCat').value;
  const branch = document.getElementById('filterBranch').value;
  const status = document.getElementById('filterStatus') ? document.getElementById('filterStatus').value : 'all';

  return _allSubs.filter(s => {
    const name  = (s.member1Name || s.teamName || '').toLowerCase();
    const email = (s.member1Email || '').toLowerCase();
    const id    = (s.id || '').toLowerCase();
    const phone = (s.member1Phone || '').toLowerCase();
    const matchQ = !q || name.includes(q) || email.includes(q) || id.includes(q) || phone.includes(q);
    const matchC = cat === 'all' || s.participationType === cat;
    const matchB = branch === 'all' || s.branch === branch;
    const matchS = status === 'all' || s.status === status;
    return matchQ && matchC && matchB && matchS;
  });
}

function renderTable() {
  const filtered = getFiltered();
  const total    = filtered.length;
  const pages    = Math.max(1, Math.ceil(total / PER_PAGE));
  currentPage    = Math.min(currentPage, pages);
  const slice    = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('subCountLabel').textContent = `${total} participant${total !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('participantsTable');
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><div class="empty-icon">👥</div><p>No participants found</p></div></td></tr>`;
  } else {
    tbody.innerHTML = slice.map((s, i) => `
      <tr>
        <td style="color:var(--text-muted);font-size:0.78rem;">${(currentPage-1)*PER_PAGE+i+1}</td>
        <td class="td-id">${s.id}</td>
        <td class="td-name">${s.member1Name || s.teamName}</td>
        <td>
          <div style="font-size:0.82rem;">${s.member1Email || '—'}</div>
          <div style="font-size:0.78rem;color:var(--text-muted);">${s.member1Phone || ''}</div>
        </td>
        <td style="font-size:0.82rem;font-family:'Outfit',sans-serif;color:var(--primary-light);font-weight:600;">${s.member1Roll || '—'}</td>
        <td style="font-size:0.82rem;">${s.branch || '—'} - ${s.section || '—'}</td>
        <td style="font-size:0.82rem;">1st Year</td>
        <td><span class="badge badge-green" style="font-size:0.72rem;">${s.participationType}</span></td>
        <td style="font-size:1rem;">🌿</td>
        <td><span class="status-${s.status}">${s.status.charAt(0).toUpperCase()+s.status.slice(1)}</span></td>
        <td class="td-actions">
          <button class="action-btn action-view" onclick="viewParticipant('${s.id}')">
            <i data-lucide="eye" style="width:12px;height:12px;"></i> View
          </button>
          ${s.status !== 'approved' ? `<button class="action-btn action-approve" onclick="setStatus('${s.id}','approved')">✓</button>` : ''}
          ${s.status !== 'rejected' ? `<button class="action-btn action-reject"  onclick="setStatus('${s.id}','rejected')">✕</button>` : ''}
          <button class="action-btn action-delete" onclick="deleteSub('${s.id}')">🗑</button>
        </td>
      </tr>`).join('');
  }

  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (pages > 1) {
    const prev = document.createElement('button');
    prev.className='page-btn'; prev.textContent='‹'; prev.disabled=currentPage===1;
    prev.onclick=()=>{currentPage--;renderTable();};
    pg.appendChild(prev);
    for(let i=1;i<=pages;i++){
      const b=document.createElement('button');
      b.className='page-btn'+(i===currentPage?' active':'');
      b.textContent=i; b.onclick=()=>{currentPage=i;renderTable();};
      pg.appendChild(b);
    }
    const next=document.createElement('button');
    next.className='page-btn'; next.textContent='›'; next.disabled=currentPage===pages;
    next.onclick=()=>{currentPage++;renderTable();};
    pg.appendChild(next);
  }
  if (window.lucide) lucide.createIcons();
}

async function setStatus(id, status) {
  await TURSO.updateSubmissionStatus(id, status);
  const idx = _allSubs.findIndex(s => s.id === id);
  if (idx > -1) _allSubs[idx].status = status;
  showToast(status === 'approved' ? '✅ Approved!' : '❌ Rejected', status === 'approved' ? 'success' : 'error');
  renderTable();
  if (document.getElementById('detailModal').classList.contains('open')) viewParticipant(id);
}

async function deleteSub(id) {
  if (!confirm('Delete this registration permanently?')) return;
  await TURSO.deleteSubmission(id);
  _allSubs = _allSubs.filter(s => s.id !== id);
  showToast('Registration removed', 'info');
  renderTable();
}

function viewParticipant(id) {
  const s = _allSubs.find(x => x.id === id);
  if (!s) return;
  document.getElementById('detailTitle').textContent = s.member1Name || s.teamName;
  document.getElementById('detailBody').innerHTML = `
    <div style="text-align:center;margin-bottom:1rem;background:var(--bg-deep);padding:1rem;border-radius:var(--radius-md);">
      <div style="margin-bottom:0.5rem;font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;">Payment Screenshot</div>
      ${s.paymentScreenshotUrl 
        ? `<a href="${s.paymentScreenshotUrl}" target="_blank"><img src="${s.paymentScreenshotUrl}" style="max-width:100%;max-height:200px;border-radius:4px;object-fit:contain;" /></a>` 
        : '<span style="color:var(--text-muted);">No payment screenshot attached</span>'}
    </div>
    <div class="detail-row"><span class="detail-label">Submission ID</span><span class="detail-value td-id">${s.id}</span></div>
    <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value">${s.member1Name || s.teamName}</span></div>
    <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${s.member1Email || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${s.member1Phone || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Roll / Reg. No</span><span class="detail-value" style="color:var(--primary-light);font-weight:600;">${s.member1Roll || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Branch & Section</span><span class="detail-value">${s.branch || '—'} - ${s.section || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${s.participationType}</span></div>
    ${s.aiFlags ? `<div class="detail-row"><span class="detail-label" style="color:var(--secondary-light);">AI Analysis</span><span class="detail-value" style="color:var(--secondary-light);font-weight:bold;">⚠️ ${s.aiFlags}</span></div>` : ''}
    <div class="detail-row"><span class="detail-label">Status</span><span class="status-${s.status}">${s.status}</span></div>
    <div class="detail-row"><span class="detail-label">Registered</span><span class="detail-value">${formatDate(s.submittedAt)}</span></div>
    <div style="margin-top:1.25rem;display:flex;gap:0.75rem;flex-wrap:wrap;">
      ${s.status !== 'approved' ? `<button class="btn btn-primary" style="font-size:0.85rem;padding:0.6rem 1.2rem;" onclick="setStatus('${s.id}','approved')">✓ Approve</button>` : ''}
      ${s.status !== 'rejected' ? `<button class="action-btn action-reject" style="font-size:0.85rem;padding:0.6rem 1.2rem;" onclick="setStatus('${s.id}','rejected')">✕ Reject</button>` : ''}
      <a href="submissions.html" class="btn btn-outline" style="font-size:0.85rem;padding:0.6rem 1.2rem;">View Files</a>
      <button class="btn btn-outline" style="font-size:0.85rem;padding:0.6rem 1.2rem;" onclick="document.getElementById('detailModal').classList.remove('open')">Close</button>
    </div>`;
  document.getElementById('detailModal').classList.add('open');
  if (window.lucide) lucide.createIcons();
}

async function exportAllCSV() {
  exportCSV(_allSubs, 'leaf_lens_participants.csv');
}

document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
</script>
</body>
</html>
