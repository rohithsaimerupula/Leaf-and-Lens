<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submissions — Leaf & Lens Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <script src="../assets/js/turso.js?v=1.0.3"></script>
</head>
<body class="admin-body">

<!-- SIDEBAR -->
<aside class="admin-sidebar" id="adminSidebar">
  <div class="sidebar-logo">
    <span style="font-size:1.6rem;">🌿</span>
    <div><div class="sidebar-logo-text">Leaf &amp; Lens</div><span class="sidebar-admin-badge">Admin Panel</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main</div>
    <a href="dashboard.html" class="sidebar-link"><i data-lucide="layout-dashboard" style="width:16px;height:16px;"></i> Dashboard</a>
    <a href="submissions.html" class="sidebar-link active"><i data-lucide="image" style="width:16px;height:16px;"></i> Submissions</a>
    <a href="participants.html" class="sidebar-link"><i data-lucide="users" style="width:16px;height:16px;"></i> Participants</a>
    <a href="results.html" class="sidebar-link"><i data-lucide="trophy" style="width:16px;height:16px;"></i> Results</a>
    <a href="registrations.html" class="sidebar-link"><i data-lucide="settings" style="width:16px;height:16px;"></i> Registrations</a>
    <div class="sidebar-section-label">Site</div>
    <a href="../home.html" class="sidebar-link" target="_blank"><i data-lucide="external-link" style="width:16px;height:16px;"></i> View Site</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-logout" id="logoutBtn"><i data-lucide="log-out" style="width:15px;height:15px;"></i> Sign Out</button>
  </div>
</aside>

<!-- MAIN -->
<main class="admin-main">
  <div class="admin-topbar">
    <h1 class="topbar-title">Submissions Manager</h1>
    <div class="topbar-right">
      <span id="subCountLabel" style="font-size:0.82rem;color:var(--text-muted);"></span>
    </div>
  </div>

  <div class="admin-content">
    
    <!-- Tabs -->
    <div style="display:flex;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:1rem;">
      <button class="btn btn-outline" id="tab-table" onclick="switchView('table')" style="border:none;background:rgba(82,183,136,0.1);color:var(--primary-light);">
        📋 All Submissions
      </button>
      <button class="btn btn-outline" id="tab-photos" onclick="switchView('photos')" style="border:none;color:var(--text-muted);">
        🖼️ Rate Photos
      </button>
      <button class="btn btn-outline" id="tab-reels" onclick="switchView('reels')" style="border:none;color:var(--text-muted);">
        🎬 Rate Reels
      </button>
    </div>

    <!-- Rating Gallery View -->
    <div id="galleryView" style="display:none;">
      <div id="galleryGrid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:1.5rem;">
        <!-- Generated via JS -->
      </div>
    </div>

    <!-- Table View -->
    <div id="tableView">
      <!-- FILTER BAR -->
      <div class="admin-table-wrap" style="margin-bottom:1.25rem;padding:1rem 1.5rem;">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
        <div class="search-wrap">
          <i data-lucide="search" class="search-icon" style="width:14px;height:14px;"></i>
          <input type="text" class="table-search" id="searchInput" placeholder="Search name, email, ID..." oninput="renderTable()" />
        </div>
        <select class="table-filter" id="filterCat" onchange="renderTable()">
          <option value="all">All Categories</option>
          <option value="Photo">Photo</option>
          <option value="Reel">Reel</option>
          <option value="Both">Both</option>
        </select>
        <div style="margin-left:auto;display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-outline" style="font-size:0.82rem;padding:0.45rem 1rem;" onclick="exportAllCSV()">
            <i data-lucide="download" style="width:14px;height:14px;"></i> Export CSV
          </button>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="admin-table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Category</th>
            <th>Roll No</th><th>Branch &amp; Sec</th><th>Submitted</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="submissionsTable"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
    </div> <!-- /tableView -->
  </div>
</main>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Submission Detail</span>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
    </div>
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-detail" id="modalDetail"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap;" id="modalActions"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../assets/js/main.js"></script>
<script>
const PER_PAGE = 10;
let currentPage = 1;
let selectedIds = new Set();
let _allSubs = [];
let currentView = 'table';

document.addEventListener('DOMContentLoaded', async () => {
  if (!LL.isAdminLoggedIn()) { window.location.href = 'login.html'; return; }
  if (window.lucide) lucide.createIcons();
  _allSubs = await TURSO.getSubmissions();
  renderTable();
  document.getElementById('logoutBtn').addEventListener('click', () => { LL.adminLogout(); window.location.href = 'login.html'; });
});

function switchView(mode) {
  currentView = mode;
  document.getElementById('tab-table').style.background = mode === 'table' ? 'rgba(82,183,136,0.1)' : 'transparent';
  document.getElementById('tab-table').style.color = mode === 'table' ? 'var(--primary-light)' : 'var(--text-muted)';
  document.getElementById('tab-photos').style.background = mode === 'photos' ? 'rgba(82,183,136,0.1)' : 'transparent';
  document.getElementById('tab-photos').style.color = mode === 'photos' ? 'var(--primary-light)' : 'var(--text-muted)';
  document.getElementById('tab-reels').style.background = mode === 'reels' ? 'rgba(82,183,136,0.1)' : 'transparent';
  document.getElementById('tab-reels').style.color = mode === 'reels' ? 'var(--primary-light)' : 'var(--text-muted)';

  if (mode === 'table') {
    document.getElementById('tableView').style.display = 'block';
    document.getElementById('galleryView').style.display = 'none';
    renderTable();
  } else {
    document.getElementById('tableView').style.display = 'none';
    document.getElementById('galleryView').style.display = 'block';
    renderGallery(mode);
  }
}

function renderGallery(mode) {
  const grid = document.getElementById('galleryGrid');
  const subs = _allSubs.filter(s => s.status === 'approved' && (s.participationType === 'Both' || s.participationType === (mode==='photos'?'Photo':'Reel')));
  
  if (!subs.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">No approved ${mode} found.</div>`;
    return;
  }

  grid.innerHTML = subs.map(s => `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;">
      <div style="height:200px;background:#000;display:flex;align-items:center;justify-content:center;">
        ${mode === 'reels' && s.reelUrl 
          ? `<video src="${s.reelUrl}" controls style="max-height:100%;max-width:100%;"></video>` 
          : `<img src="${s.photoUrl}" style="max-height:100%;max-width:100%;object-fit:contain;" />`
        }
      </div>
      <div style="padding:1rem;flex:1;display:flex;flex-direction:column;gap:0.5rem;">
        <div style="font-weight:600;font-size:1.05rem;">${s.member1Name || s.teamName} <span style="font-size:0.75rem;color:var(--text-muted);font-weight:normal;">(Leader)</span></div>
        <div style="font-size:0.8rem;color:var(--text-muted);display:flex;justify-content:space-between;">
          <span>📞 ${s.member1Phone || 'N/A'}</span>
          <a href="mailto:${s.member1Email}?subject=Leaf%20%26%20Lens%20Competition%20Update" style="color:var(--primary-light);text-decoration:none;">✉️ Email</a>
        </div>
        <div style="margin-top:auto;display:flex;gap:0.5rem;align-items:center;padding-top:0.75rem;border-top:1px solid var(--border);">
          <input type="number" id="rating-${s.id}" value="${s.rating || ''}" min="0" max="10" placeholder="/10" style="width:60px;padding:0.4rem;background:var(--bg-deep);border:1px solid var(--border);border-radius:4px;color:var(--text-bright);text-align:center;">
          <button class="btn btn-primary" style="flex:1;padding:0.4rem;" onclick="saveRating('${s.id}')">Save Rating</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function saveRating(id) {
  const val = document.getElementById(`rating-${id}`).value;
  if (val === '' || val < 0 || val > 10) { showToast('Enter a valid rating 0-10', 'error'); return; }
  if (TURSO.updateSubmissionRating) {
    await TURSO.updateSubmissionRating(id, parseFloat(val));
    const idx = _allSubs.findIndex(x => x.id === id);
    if (idx > -1) _allSubs[idx].rating = parseFloat(val);
    showToast('Rating saved!', 'success');
  } else {
    showToast('Database error', 'error');
  }
}

function getBranchFromRoll(roll) {
  if (!roll || typeof roll !== 'string') return '';
  const r = roll.toUpperCase().trim();
  if (r.length < 8) return '';
  const code = r.substring(6, 8);
  const branches = {
    '05': 'CSE',
    '12': 'IT',
    '06': 'CS',
    '42': 'CSD',
    '43': 'CAI',
    '54': 'AIDS',
    '04': 'ECE',
    '19': 'ECM',
    '01': 'CIVIL',
    '03': 'MECH',
    '02': 'EEE'
  };
  return branches[code] || '';
}

function getFiltered() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const cat    = document.getElementById('filterCat').value;
  return _allSubs.filter(s => {
    if (s.status !== 'approved') return false; // ONLY SHOW APPROVED
    const name  = (s.member1Name || s.teamName || '').toLowerCase();
    const email = (s.member1Email || '').toLowerCase();
    const id    = (s.id || '').toLowerCase();
    const matchQ = !q || name.includes(q) || email.includes(q) || id.includes(q);
    const matchC = cat === 'all' || s.participationType === cat;
    return matchQ && matchC;
  });
}

function renderTable() {
  const filtered = getFiltered();
  const total    = filtered.length;
  const pages    = Math.max(1, Math.ceil(total / PER_PAGE));
  currentPage    = Math.min(currentPage, pages);
  const slice    = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('subCountLabel').textContent = `${total} approved submission${total !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('submissionsTable');
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">💭</div><p>No approved submissions found</p></div></td></tr>`;
  } else {
    tbody.innerHTML = slice.map(s => `
      <tr>
        <td class="td-id">${s.id}</td>
        <td class="td-name">
          <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
            <strong>${s.member1Name || s.teamName}</strong> <span style="font-size:0.7rem;color:var(--text-muted);">(Leader)</span>
            ${(s.aiFlags && s.aiFlags.toLowerCase().includes('ai')) 
              ? `<span style="background:rgba(230,57,70,0.15);color:#e63946;padding:2px 6px;border-radius:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;">🤖 AI</span>`
              : (s.aiFlags && s.aiFlags.toLowerCase().includes('edit'))
                ? `<span style="background:rgba(244,162,97,0.15);color:#f4a261;padding:2px 6px;border-radius:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;">✏️ Edited</span>`
                : `<span style="background:rgba(82,183,136,0.15);color:#52b788;padding:2px 6px;border-radius:4px;font-size:0.65rem;font-weight:700;letter-spacing:0.04em;">🟢 Natural</span>`
            }
          </div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem;">
            📞 ${s.member1Phone || 'N/A'} &nbsp;|&nbsp; 
            <a href="mailto:${s.member1Email}?subject=Leaf%20%26%20Lens%20Competition%20Update" style="color:var(--primary-light);text-decoration:none;">✉️ ${s.member1Email || 'Email'}</a>
          </div>
        </td>
        <td>${s.participationType}</td>
        <td style="font-size:0.82rem;">${s.member1Roll || '—'}</td>
        <td style="font-size:0.82rem;">
          ${(() => {
            const b = s.branch || getBranchFromRoll(s.member1Roll);
            const sec = s.section;
            return b ? (sec ? `${b}-${sec}`.toUpperCase() : b.toUpperCase()) : '—';
          })()}
        </td>
        <td style="font-size:0.8rem;">${formatDate(s.submittedAt)}</td>
        <td><span class="status-approved">Approved</span></td>
        <td class="td-actions">
          <button class="action-btn action-view" onclick="viewSubmission('${s.id}')">
            <i data-lucide="eye" style="width:12px;height:12px;"></i> View & Download
          </button>
        </td>
      </tr>`).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (pages > 1) {
    const prev = document.createElement('button');
    prev.className = 'page-btn'; prev.textContent = '‹';
    prev.disabled = currentPage === 1;
    prev.onclick = () => { currentPage--; renderTable(); };
    pg.appendChild(prev);
    for (let i = 1; i <= pages; i++) {
      const b = document.createElement('button');
      b.className = 'page-btn' + (i === currentPage ? ' active' : '');
      b.textContent = i;
      b.onclick = () => { currentPage = i; renderTable(); };
      pg.appendChild(b);
    }
    const next = document.createElement('button');
    next.className = 'page-btn'; next.textContent = '›';
    next.disabled = currentPage === pages;
    next.onclick = () => { currentPage++; renderTable(); };
    pg.appendChild(next);
  }
  if (window.lucide) lucide.createIcons();
}

// Unused functions removed



function viewSubmission(id) {
  const s = _allSubs.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalTitle').textContent = s.id + ' — ' + (s.member1Name || s.teamName);
  const prev = document.getElementById('modalPreview');
  let mediaHTML = '';
  const isPhoto = s.participationType === 'Photo' || s.participationType === 'Both';
  const isReel = s.participationType === 'Reel' || s.participationType === 'Both';
  
  if (isPhoto && s.photoUrl && s.photoUrl !== 'null' && s.photoUrl !== 'undefined') {
    mediaHTML += `
      <div style="margin-bottom:1.5rem;">
        <img src="${s.photoUrl}" alt="Photo Submission" style="max-height:60vh;max-width:100%;object-fit:contain;border-radius:4px;" />
        <div style="margin-top:0.5rem;text-align:center;">
          <a href="${s.photoUrl}" download="Photo_${s.id}.jpg" target="_blank" class="btn btn-primary" style="padding:0.4rem 1rem;font-size:0.8rem;">
            <i data-lucide="download" style="width:14px;height:14px;margin-right:6px;"></i> Download Photo
          </a>
        </div>
      </div>
    `;
  }
  if (isReel && s.reelUrl && s.reelUrl !== 'null' && s.reelUrl !== 'undefined') {
    mediaHTML += `
      <div style="margin-bottom:1rem;">
        <video src="${s.reelUrl}" controls style="max-height:60vh;max-width:100%;border-radius:4px;"></video>
        <div style="margin-top:0.5rem;text-align:center;">
          <a href="${s.reelUrl}" download="Reel_${s.id}.mp4" target="_blank" class="btn btn-primary" style="padding:0.4rem 1rem;font-size:0.8rem;">
            <i data-lucide="download" style="width:14px;height:14px;margin-right:6px;"></i> Download Reel
          </a>
        </div>
      </div>
    `;
  }
  if (!mediaHTML) {
    mediaHTML = `<div style="padding:2rem;text-align:center;color:var(--text-muted);background:var(--bg-deep);border-radius:var(--radius-md);">No file preview available</div>`;
  }
  prev.innerHTML = mediaHTML;
  document.getElementById('modalDetail').innerHTML = `
    <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${s.member1Name || s.teamName}</span></div>
    <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${s.member1Email || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${s.member1Phone || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Roll No</span><span class="detail-value" style="color:var(--primary-light);font-weight:600;">${s.member1Roll || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Branch & Section</span><span class="detail-value">
      ${(() => {
        const b = s.branch || getBranchFromRoll(s.member1Roll);
        const sec = s.section;
        return b ? (sec ? `${b}-${sec}`.toUpperCase() : b.toUpperCase()) : '—';
      })()}
    </span></div>
    <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${s.participationType}</span></div>
    <div class="detail-row">
      <span class="detail-label">AI Analysis</span>
      <span class="detail-value" style="font-weight:bold;">
        ${(s.aiFlags && s.aiFlags.toLowerCase().includes('ai')) 
          ? `<span style="color:#e63946;">🤖 AI Generated (${s.aiFlags})</span>`
          : (s.aiFlags && s.aiFlags.toLowerCase().includes('edit'))
            ? `<span style="color:#f4a261;">✏️ Edited (${s.aiFlags})</span>`
            : `<span style="color:#52b788;">✓ Natural / Authentic</span>`
        }
      </span>
    </div>
    <div class="detail-row"><span class="detail-label">Status</span><span class="status-${s.status}">${s.status}</span></div>
    <div class="detail-row"><span class="detail-label">Submitted</span><span class="detail-value">${formatDate(s.submittedAt)}</span></div>`;
  document.getElementById('modalActions').innerHTML = `
    <a href="mailto:${s.member1Email}?subject=Leaf%20%26%20Lens%20Competition%20-%20Update/Certificate" class="btn btn-primary" style="padding:0.6rem 1.2rem;text-decoration:none;">
      ✉️ Send Message / Certificate
    </a>
    <button class="btn btn-outline" onclick="closeModal()">Close</button>`;
  document.getElementById('viewModal').classList.add('open');
  if (window.lucide) lucide.createIcons();
}

async function exportAllCSV() {
  exportCSV(_allSubs, 'leaf_lens_submissions.csv');
}

function closeModal() { document.getElementById('viewModal').classList.remove('open'); }
document.getElementById('viewModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
</body>
</html>
