<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submissions — Leaf & Lens Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body class="admin-body">

<!-- SIDEBAR -->
<aside class="admin-sidebar" id="adminSidebar">
  <div class="sidebar-logo">
    <span style="font-size:1.6rem;">🌿</span>
    <div><div class="sidebar-logo-text">Leaf &amp; Lens</div><span class="sidebar-admin-badge">Admin Panel</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Main</div>
    <a href="dashboard.html" class="sidebar-link"><i data-lucide="layout-dashboard" style="width:16px;height:16px;"></i> Dashboard</a>
    <a href="submissions.html" class="sidebar-link active"><i data-lucide="image" style="width:16px;height:16px;"></i> Submissions</a>
    <a href="participants.html" class="sidebar-link"><i data-lucide="users" style="width:16px;height:16px;"></i> Participants</a>
    <a href="results.html" class="sidebar-link"><i data-lucide="trophy" style="width:16px;height:16px;"></i> Results</a>
    <div class="sidebar-section-label">Site</div>
    <a href="../home.html" class="sidebar-link" target="_blank"><i data-lucide="external-link" style="width:16px;height:16px;"></i> View Site</a>
  </nav>
  <div class="sidebar-bottom">
    <button class="sidebar-logout" id="logoutBtn"><i data-lucide="log-out" style="width:15px;height:15px;"></i> Sign Out</button>
  </div>
</aside>

<!-- MAIN -->
<main class="admin-main">
  <div class="admin-topbar">
    <h1 class="topbar-title">Submissions Manager</h1>
    <div class="topbar-right">
      <span id="subCountLabel" style="font-size:0.82rem;color:var(--text-muted);"></span>
    </div>
  </div>

  <div class="admin-content">
    <!-- FILTER BAR -->
    <div class="admin-table-wrap" style="margin-bottom:1.25rem;padding:1rem 1.5rem;">
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
        <div class="search-wrap">
          <i data-lucide="search" class="search-icon" style="width:14px;height:14px;"></i>
          <input type="text" class="table-search" id="searchInput" placeholder="Search name, email, ID..." oninput="renderTable()" />
        </div>
        <select class="table-filter" id="filterStatus" onchange="renderTable()">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
        <select class="table-filter" id="filterCat" onchange="renderTable()">
          <option value="all">All Categories</option>
          <option value="Photo">Photo</option>
          <option value="Reel">Reel</option>
          <option value="Both">Both</option>
        </select>
        <div style="margin-left:auto;display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-outline" style="font-size:0.82rem;padding:0.45rem 1rem;" onclick="bulkAction('approved')">
            <i data-lucide="check-circle" style="width:14px;height:14px;"></i> Approve Selected
          </button>
          <button class="btn btn-outline" style="font-size:0.82rem;padding:0.45rem 1rem;color:var(--red-alert);border-color:rgba(230,57,70,0.3);" onclick="bulkAction('rejected')">
            <i data-lucide="x-circle" style="width:14px;height:14px;"></i> Reject Selected
          </button>
          <button class="btn btn-outline" style="font-size:0.82rem;padding:0.45rem 1rem;" onclick="exportCSV(LL.getSubmissions(),'leaf_lens_submissions.csv')">
            <i data-lucide="download" style="width:14px;height:14px;"></i> Export CSV
          </button>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="admin-table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" style="accent-color:var(--primary-light);" /></th>
            <th>ID</th><th>Name</th><th>Category</th>
            <th>City</th><th>Submitted</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="submissionsTable"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</main>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Submission Detail</span>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width:18px;height:18px;"></i></button>
    </div>
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-detail" id="modalDetail"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap;" id="modalActions"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../assets/js/main.js"></script>
<script>
const PER_PAGE = 10;
let currentPage = 1;
let selectedIds = new Set();

document.addEventListener('DOMContentLoaded', () => {
  if (!LL.isAdminLoggedIn()) { window.location.href = 'login.html'; return; }
  if (window.lucide) lucide.createIcons();
  renderTable();
  document.getElementById('logoutBtn').addEventListener('click', () => { LL.adminLogout(); window.location.href = 'login.html'; });
});

function getFiltered() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const cat    = document.getElementById('filterCat').value;
  return LL.getSubmissions().filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q) || s.id.toLowerCase().includes(q);
    const matchS = status === 'all' || s.status === status;
    const matchC = cat === 'all' || s.category === cat;
    return matchQ && matchS && matchC;
  }).reverse();
}

function renderTable() {
  const filtered = getFiltered();
  const total    = filtered.length;
  const pages    = Math.max(1, Math.ceil(total / PER_PAGE));
  currentPage    = Math.min(currentPage, pages);
  const slice    = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

  document.getElementById('subCountLabel').textContent = `${total} submission${total !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('submissionsTable');
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><p>No submissions found</p></div></td></tr>`;
  } else {
    tbody.innerHTML = slice.map(s => `
      <tr>
        <td><input type="checkbox" class="row-check" data-id="${s.id}" ${selectedIds.has(s.id)?'checked':''} onchange="toggleSelect('${s.id}',this.checked)" style="accent-color:var(--primary-light);" /></td>
        <td class="td-id">${s.id}</td>
        <td class="td-name">${s.name}<br><span style="font-size:0.75rem;color:var(--text-muted);">${s.email}</span></td>
        <td>${s.category}</td>
        <td style="font-size:0.82rem;">${s.city}</td>
        <td style="font-size:0.8rem;">${formatDate(s.submittedAt)}</td>
        <td><span class="status-${s.status}">${s.status.charAt(0).toUpperCase()+s.status.slice(1)}</span></td>
        <td class="td-actions">
          <button class="action-btn action-view" onclick="viewSubmission('${s.id}')">
            <i data-lucide="eye" style="width:12px;height:12px;"></i> View
          </button>
          ${s.status !== 'approved' ? `<button class="action-btn action-approve" onclick="setStatus('${s.id}','approved')">✓</button>` : ''}
          ${s.status !== 'rejected' ? `<button class="action-btn action-reject"  onclick="setStatus('${s.id}','rejected')">✕</button>` : ''}
          <button class="action-btn action-delete" onclick="deleteSubmission('${s.id}')">🗑</button>
        </td>
      </tr>`).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (pages > 1) {
    const prev = document.createElement('button');
    prev.className = 'page-btn'; prev.textContent = '‹';
    prev.disabled = currentPage === 1;
    prev.onclick = () => { currentPage--; renderTable(); };
    pg.appendChild(prev);

    for (let i = 1; i <= pages; i++) {
      const b = document.createElement('button');
      b.className = 'page-btn' + (i === currentPage ? ' active' : '');
      b.textContent = i;
      b.onclick = () => { currentPage = i; renderTable(); };
      pg.appendChild(b);
    }

    const next = document.createElement('button');
    next.className = 'page-btn'; next.textContent = '›';
    next.disabled = currentPage === pages;
    next.onclick = () => { currentPage++; renderTable(); };
    pg.appendChild(next);
  }

  if (window.lucide) lucide.createIcons();
}

function setStatus(id, status) {
  const subs = LL.getSubmissions();
  const idx  = subs.findIndex(s => s.id === id);
  if (idx > -1) { subs[idx].status = status; LL.saveSubmissions(subs); }
  showToast(status === 'approved' ? '✅ Approved!' : '❌ Rejected', status === 'approved' ? 'success' : 'error');
  renderTable();
  if (document.getElementById('viewModal').classList.contains('open')) closeModal();
}

function deleteSubmission(id) {
  if (!confirm('Delete this submission permanently?')) return;
  const subs = LL.getSubmissions().filter(s => s.id !== id);
  LL.saveSubmissions(subs);
  showToast('Submission deleted', 'info');
  renderTable();
}

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
}

function toggleSelectAll(el) {
  const checks = document.querySelectorAll('.row-check');
  const filtered = getFiltered();
  const slice = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
  checks.forEach(c => { c.checked = el.checked; });
  slice.forEach(s => { if (el.checked) selectedIds.add(s.id); else selectedIds.delete(s.id); });
}

function bulkAction(status) {
  if (!selectedIds.size) { showToast('Select at least one submission', 'error'); return; }
  if (!confirm(`${status === 'approved' ? 'Approve' : 'Reject'} ${selectedIds.size} submission(s)?`)) return;
  const subs = LL.getSubmissions();
  subs.forEach(s => { if (selectedIds.has(s.id)) s.status = status; });
  LL.saveSubmissions(subs);
  selectedIds.clear();
  showToast(`${status === 'approved' ? '✅ Approved' : '❌ Rejected'} ${selectedIds.size} submissions`, 'success');
  renderTable();
}

function viewSubmission(id) {
  const s = LL.getSubmissions().find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalTitle').textContent = s.id + ' — ' + s.name;
  const prev = document.getElementById('modalPreview');
  if (s.fileData) {
    if (s.fileType && s.fileType.startsWith('video')) {
      prev.innerHTML = `<video src="${s.fileData}" controls></video>`;
    } else {
      prev.innerHTML = `<img src="${s.fileData}" alt="Submission" />`;
    }
  } else {
    prev.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--text-muted);background:var(--bg-deep);border-radius:var(--radius-md);">No file preview available</div>`;
  }
  document.getElementById('modalDetail').innerHTML = `
    <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${s.name}</span></div>
    <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${s.email}</span></div>
    <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${s.phone}</span></div>
    <div class="detail-row"><span class="detail-label">Age Group</span><span class="detail-value">${s.ageGroup}</span></div>
    <div class="detail-row"><span class="detail-label">City</span><span class="detail-value">${s.city}</span></div>
    <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${s.category}</span></div>
    <div class="detail-row"><span class="detail-label">Instagram</span><span class="detail-value">${s.instagram || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Pledge</span><span class="detail-value">${s.pledge ? '✅ Pledged' : '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Status</span><span class="status-${s.status}">${s.status}</span></div>
    <div class="detail-row"><span class="detail-label">Submitted</span><span class="detail-value">${formatDate(s.submittedAt)}</span></div>
    <div style="margin-top:0.75rem;">
      <div class="detail-label" style="margin-bottom:0.4rem;">Caption</div>
      <div style="font-size:0.88rem;color:var(--text-secondary);line-height:1.7;background:var(--bg-deep);padding:0.75rem;border-radius:var(--radius-md);">${s.caption}</div>
    </div>`;
  document.getElementById('modalActions').innerHTML = `
    ${s.status !== 'approved' ? `<button class="btn btn-primary" onclick="setStatus('${s.id}','approved')">✓ Approve</button>` : ''}
    ${s.status !== 'rejected' ? `<button class="action-btn action-reject" style="padding:0.6rem 1.2rem;" onclick="setStatus('${s.id}','rejected')">✕ Reject</button>` : ''}
    <button class="btn btn-outline" onclick="closeModal()">Close</button>`;
  document.getElementById('viewModal').classList.add('open');
  if (window.lucide) lucide.createIcons();
}

function closeModal() { document.getElementById('viewModal').classList.remove('open'); }
document.getElementById('viewModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
</body>
</html>
